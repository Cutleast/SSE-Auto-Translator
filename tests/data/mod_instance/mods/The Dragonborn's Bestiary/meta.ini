nexusDescription="[img]https://i.imgur.com/aimpdBA.png[/img]\n<br />[center][youtube]MmWiqaD7UYY[/youtube][/center]\n<br />\n<br />\n<br />[img]https://i.imgur.com/vv3jAYD.png[/img]\n<br />[size=3][b][size=4]The Dragonborn's Bestiary[/size][/b] is a project I have been wanting to work on for a very long time. If you are like me and love reading the different entries for creatures in games like The Witcher 3, or grabbing lore tidbits in Assassin's Creed's databases, then this one is for you. And if you like to play with resistances mods like Resistances and Weaknesses and the likes, then the Bestiary could come in handy during your adventures.\n<br />The base mod comes with [b]122 bestiary entries[/b], covering all [b]Vanilla[/b], [b]DLC [/b]and [b]CC [/b]creatures. Add-ons are available as well for mod-added creatures.[/size]\n<br />\n<br />\n<br />[left][size=4]Features:[/size]\n<br />[list][size=3][*]New custom menu\n<br />[*]HUD Widget\n<br />[*]Varied gameplay mechanics to unlock entries\n<br />[*]Kill, summon and transformation counters\n<br />[*]Widescreen 21:9 support\n<br />[*]Gamepad support\n<br />[*]SKSE plugin, compatible with all game versions\n<br />\n<br />[/size][/list][/left]\n<br />\n<br />\n<br />[img]https://i.imgur.com/QZ57RHJ.png[/img]\n<br />[size=3]To open the new Bestiary menu, press K by default. The hotkey can be changed in the mod's INI file.\n<br />[color=#ffff00]On the left of the menu[/color], you can browse the different categories and their associated creatures. You can browse this menu either with [b]keyboard [/b]navigation keys, with the [b]mouse [/b]or with [b]joysticks [/b]if using a gamepad. \n<br />[color=#ff0000]On the top of the menu[/color], you can switch between a creature's [b]variants [/b]by pressing [b]Q [/b]and [b]R[/b]. If you are playing with a gamepad, press [b]LB[/b] and [b]RB[/b] to switch between variants. Alternatively, you can also [b]click [/b]on the arrows next to the variants' names.\n<br />\n<br />[img]https://i.imgur.com/oJzl2Wb.png[/img]\n<br />[center][i]﻿Screenshot of the new Bestiary Menu with interactive areas highlighted.[/i][/center]\n<br />\n<br />[center][img]https://i.imgur.com/lyfhG2O.png[/img][/center][center][i]﻿The mod automatically detects if you are using a gamepad\n<br />and displays the appropriate icons.\n<br />[/i][/center]\n<br />\n<br />The Bestiary includes a [b]description[/b] of the creature, along with its potential [b]loot [/b]as well as its [b]resistances and weaknesses[/b]. All this information is contained in JSON files and can be easily edited (more about that below).\n<br />The Bestiary also tracks the number of times you have [b]killed[/b], [b]summoned [/b]or... [b]transformed [/b]into a creature! The kill counter will always be visible, even when at 0. The summon and transformation counters only appear after they have first been incremented.\n<br />\n<br />\n<br />[center][img]https://i.imgur.com/unKkpS9.png[/img][/center][center][i]﻿The three types of counters. They appear\n<br />next to the creature's description.[/i][/center]\n<br />\n<br />\n<br />[img]https://i.imgur.com/Y50BRul.png[/img]\n<br />There are many ways to unlock a creature's entry in the Bestiary.\n<br />\n<br />[/size][list]\n<br />[*][size=3][b]Killing[/b]: ﻿the most straightforward way to unlock a creature's entry is by slaying them.[/size]\n<br />[*][size=3][b]Summoning[/b]: for mages and necromancers alike, this is a convenient and safe way to unlock new entries.[/size]\n<br />[*][size=3][b]Transforming[/b]: if you play a Werewolf or Vampire Lord character, you can unlock these creature's entries by transforming.[/size]\n<br />[*][size=3][b]Reading[/b]: a good monster hunter is a prepared one. Reading a book about a given creature unlocks its entry, and allows you to learn about its strengths and weaknesses before the fight.[/size]\n<br />[*][size=3][b]Interacting[/b]: interact with peaceful animals and pets to unlock their respective entries. No need to hurt the dogs.[/size]\n<br />[*][size=3][b]Dialogue[/b]: talking to certain characters will unlock an entry in the bestiary (used once in the base mod for a special creature).[/size]\n<br />[/list][size=3]\n<br />Once a creature has been unlocked, a widget will appear on the right of your screen to indicate that a new entry is available in the Bestiary. You can adjust the widget's position in the mod's INI file.\n<br />\n<br />[center][img]https://i.imgur.com/eJPLDli.png[/img][/center][center][i]﻿Widget announcing a new entry has been unlocked.\n<br />[/i][/center]\n<br />\n<br />If you want to unlock all available entries for debugging, or simply because you are curious, type the following command in the console: [/size][size=3][i]set rpgui_devmode to 1[/i][/size][size=3]\n<br />\n<br />[img]https://i.imgur.com/CO11iSi.png[/img]\n<br />Modularity was at the core of this mod's design from the beginning. [b]Editing, adding and removing creatures or categories is extremely easy[/b]. Same goes for translating the mod. You can truly tailor the Bestiary to your liking and create add-ons for you favorite mod-added creatures in a convenient way. Most of the edits you make are also displayed at runtime, without the need to restart the game after each change.\n<br />\n<br />I have written a few [b]articles [/b]that explain how to do it in detail:\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/articles/7045]Editing and Adding Creatures[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/articles/7046]Editing and Adding Categories[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/articles/7047]Translations[/url]\n<br />\n<br />\n<br />\n<br />[img]https://i.imgur.com/PIRu0GJ.png[/img]\n<br />[/size][size=5][b]\n<br />Mod-added creatures[/b][/size][size=3]\n<br />\n<br />The base mod covers [b]122 creatures[/b] in total, including the [b]base game[/b], [b]Dawnguard and Dragonborn DLCs[/b] and [b]all Creation Club add-ons[/b]. You can safely download the full mod even if you don't use all these add-ons, this won't cause any issue. \n<br />\n<br />[b]Bestiary Add-Ons[/b] are available at launch for the following mods (under optional files):\n<br />[url=https://www.patreon.com/posts/sc-horses-35289631]SC - Horses[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/47541]Bears of the North[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/10917]Beyond Skyrim - Bruma SE[/url]﻿\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/103559]Tales of Skyrim - Berserkyr[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/86338]Falmer Overhaul - New models and textures[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/76082]Kthonia Minions - New Conjuration Spells[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/43259]Welwas SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/59363]Ogres SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/55719]Flesh Colossus SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/56497]Daedra SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/54409]Goblins and Durzogs SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/50435]Morrowind Creatures SE[/url]\n<br />\n<br />Minor conflicts might arise when using add-ons. For example, the base mod comes with an entry for the Zombie, and the Bruma Add-On overwrites it with its own illustration. In such cases, you have to choose which \"zombie.dds\" you prefer, and let it overwrite the other. Alternatively, instead of overwriting, you can simply delete the illustration you don't want to keep.\n<br />The same applies for loot and resistances data (in the case of goblins or ogres for example).\n<br />\n<br />[b]\n<br />[size=5]Resistances mods[/size][/b][/size][size=3]\n<br />\n<br />The mod will automatically detect if you are using the [url=https://www.nexusmods.com/skyrimspecialedition/mods/45253]Resistances and Weaknesses[/url] mod and load the appropriate resistances, otherwise it will default to Vanilla configuration. I heavily recommend using the \"Resistances and Weaknesses Tweaks\" (in this mod's optional files) if you are using that mod. It corrects some inconsistencies and distributes appropriate attributes to CC and several mod-added creatures. The information shown in the Bestiary reflects these changes.\n<br />\n<br />Additional slots have been created for [url=https://www.nexusmods.com/skyrimspecialedition/mods/93258]Know Your Enemy 2[/url] and [url=https://www.nexusmods.com/skyrimspecialedition/mods/60888]Requiem[/url]. The mod automatically detects if one of these is active and loads the appropriate configuration. However these two mods aren't supported by default, which means that their slots are empty. They have been created to give the opportunity to other modders to create configurations for these mods' resistance distribution and release them as patches.\n<br />\n<br />\n<br />\n<br />[img]https://i.imgur.com/bNMdvyg.png[/img]\n<br />I would like to thank the following people and teams:\n<br />The [b]SKSE Team[/b] for SKSE64\n<br />[b]Schlangster [/b]for SkyUI\n<br />[b]Psychosteve [/b]for the SkyUI icons\n<br />[b]Ryan-rsm-McKenzie[/b] for the original CommonLibSSE, and [b]alandtse[/b], [b]powerofthree [/b]and [b]CharmedBaryon [/b]for its ulterior updates\n<br />[b]Powerofthree [/b]for Spell Perk Item Distributor (SPID) and Keyword Item Distributor (KID)\n<br />[b]OsmosisWrench [/b]and all [b]the people from r/skyrimmods discord[/b] who helped me with Flash, ActionScript and SKSE. This mod wouldn't exist without them!\n<br />[b]Unofficial Elder Scrolls Pages (UESP)[/b] wiki, a treasure trove of information that was my main resource for lore and in-game creature data.\n<br />[b]Greg Thompson[/b] for giving me the idea of creature variants (Q/R, LB/RB system)\n<br />[b]ChrisKley[/b] for the kill counter suggestion\n<br />All [b]the people over at Janquel's patching discord[/b] for suggestions, beta-testing and add-ons creation, and most of all for their general support and enthusiasm! Always a pleasure working with you guys!\n<br />[b]CrEaToXx [/b]for their SkyUI HUD Widget tutorial\n<br />[b]MrowrPurr [/b]for her SKSE tutorials and resources\n<br />[b]All the modders who made their work opensource[/b]. Thank you for sharing, the modding scene keeps improving thanks to you generosity.\n<br />Finally a word for my [b][color=#ff7700]Patrons[/color][/b]: thank you all for the support, confidence and feedback during this mods' development. I feel honored you keep supporting me after all these years and hope you will like the future projects just as much. Cheers![/size]\n<br />\n<br />\n<br />\n<br />\n<br />[url=https://github.com/jpsteel/skyrimbestiary]GitHub Source[/url]"
